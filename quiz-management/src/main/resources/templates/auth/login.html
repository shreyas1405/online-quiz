<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuizMaster</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                    <span class="logo-name">QuizMaster</span>
                </div>
                
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Sign in to access your dashboard</p>
                
                <div th:if="${error}" class="alert alert-error">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${message}" class="alert alert-success">
                    <i class="fa-solid fa-circle-check"></i>
                    <span th:text="${message}"></span>
                </div>
                <div th:if="${success}" class="alert alert-success">
                    <i class="fa-solid fa-circle-check"></i>
                    <span th:text="${success}"></span>
                </div>
                
                <form th:action="@{/login}" method="post">
                    <div class="form-group text-center" style="text-align: left;">
                        <label for="username" class="form-label">Email Address</label>
                        <input type="email" id="username" name="username" class="form-control" placeholder="name@domain.com" required autofocus>
                    </div>
                    <div class="form-group text-center" style="text-align: left;">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Sign In</button>
                </form>
                
                <div class="auth-footer">
                    Don't have an account? <a th:href="@{/register}">Register here</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
