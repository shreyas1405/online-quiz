<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - QuizMaster</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                    <span class="logo-name">QuizMaster</span>
                </div>
                
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Register to start taking quizzes</p>
                
                <div th:if="${error}" class="alert alert-error">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span th:text="${error}"></span>
                </div>
                
                <form th:action="@{/register}" th:object="${registerDto}" method="post">
                    <div class="form-group" style="text-align: left;">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-control" placeholder="John Doe" required>
                        <div class="form-hint" style="color: var(--danger);" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="name@domain.com" required>
                        <div class="form-hint" style="color: var(--danger);" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
                        <div class="form-hint" style="color: var(--danger);" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" placeholder="••••••••" required>
                        <div class="form-hint" style="color: var(--danger);" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                </form>
                
                <div class="auth-footer">
                    Already have an account? <a th:href="@{/login}">Login here</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
