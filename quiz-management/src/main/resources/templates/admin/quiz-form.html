<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${action == 'create'} ? 'Create Quiz - QuizMaster' : 'Edit Quiz - QuizMaster'"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                <div class="logo-text">
                    QuizMaster
                    <span>ADMIN PANEL</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section-label">Management</div>
                <a th:href="@{/admin/dashboard}" class="nav-link">
                    <i class="fa-solid fa-chart-pie nav-icon"></i> Dashboard
                </a>
                <a th:href="@{/admin/quizzes}" class="nav-link active">
                    <i class="fa-solid fa-book nav-icon"></i> Manage Quizzes
                </a>
                <a th:href="@{/admin/users}" class="nav-link">
                    <i class="fa-solid fa-users nav-icon"></i> Manage Students
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <div class="user-details">
                        <div class="user-name">Administrator</div>
                        <div class="user-role">Host Device Storage</div>
                    </div>
                </div>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="btn-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
                </form>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="breadcrumb">
                <a th:href="@{/admin/quizzes}">Quizzes</a>
                <span class="separator">&rarr;</span>
                <span class="current" th:text="${action == 'create'} ? 'Create Quiz' : 'Edit Quiz'">Quiz details</span>
            </div>

            <div class="page-header">
                <h1 th:text="${action == 'create'} ? 'Create New Quiz' : 'Edit Quiz'">Quiz Action</h1>
                <p>Provide description, topic, duration, and score configuration for the quiz below.</p>
            </div>
            
            <div class="form-card" style="max-width: 800px;">
                <form th:action="${action == 'create'} ? @{/admin/quizzes/create} : @{'/admin/quizzes/' + ${quiz.id} + '/edit'}" th:object="${quiz}" method="post">
                    
                    <div class="form-group">
                        <label for="title" class="form-label">Quiz Title <span class="required">*</span></label>
                        <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="e.g. Java Fundamentals Quiz" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="description" class="form-label">Description / Instructions</label>
                        <textarea id="description" th:field="*{description}" class="form-control" placeholder="Describe the topics covered or include student instructions..." rows="4"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="topic" class="form-label">Topic / Category <span class="required">*</span></label>
                        <input type="text" id="topic" th:field="*{topic}" class="form-control" placeholder="e.g. Programming, History, Geography" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="durationMinutes" class="form-label">Duration (Minutes) <span class="required">*</span></label>
                            <input type="number" id="durationMinutes" th:field="*{durationMinutes}" class="form-control" placeholder="e.g. 30" required min="1">
                        </div>
                        <div class="form-group">
                            <label for="passingScore" class="form-label">Passing Score (%) <span class="required">*</span></label>
                            <input type="number" id="passingScore" th:field="*{passingScore}" class="form-control" placeholder="e.g. 70" required min="0" max="100">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="checkbox-group" style="margin-top: 8px;">
                            <input type="checkbox" id="active" th:field="*{active}">
                            <span class="form-label" style="margin: 0;">Is this Quiz Active & visible to students?</span>
                        </label>
                    </div>
                    
                    <div style="margin-top: 32px; display: flex; gap: 14px;">
                        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-cloud-arrow-up"></i> <span th:text="${action == 'create'} ? 'Create Quiz & Add Questions' : 'Save Quiz Details'">Save</span></button>
                        <a th:href="@{/admin/quizzes}" class="btn btn-outline"><i class="fa-solid fa-xmark"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
